services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: trading_bot
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d trading_bot"]
      interval: 10s
      timeout: 5s
      retries: 5

  trading-bot:
    build:
      context: ./trading-bot
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3100:3100"
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - ./trading-bot/.env
    environment:
      API_PORT: ${API_PORT:-3100}
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:postgres@db:5432/trading_bot}

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      trading-bot:
        condition: service_started

  ranking-engine:
    build:
      context: ./ranking-engine
      dockerfile: Dockerfile
    profiles:
      - ranking
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/trading_bot
      EXCHANGE_ID: ${RANKING_EXCHANGE_ID:-binance}
      RANKING_INTERVALS: ${RANKING_INTERVALS:-15m,1h,4h,1d}
      RANKING_RUN_INTERVAL_MS: ${RANKING_RUN_INTERVAL_MS:-300000}
      LOOKBACK_LIMIT: ${RANKING_LOOKBACK_LIMIT:-250}
      RANKING_CONCURRENCY: ${RANKING_CONCURRENCY:-4}
      QUOTE_CURRENCIES: ${RANKING_QUOTE_CURRENCIES:-USDT}
      MAX_PAIRS: ${RANKING_MAX_PAIRS:-25}
      OUTPUT_FORMAT: ${RANKING_OUTPUT_FORMAT:-table}
      OUTPUT_LIMIT: ${RANKING_OUTPUT_LIMIT:-25}
      EXCHANGE_TIMEOUT_MS: ${RANKING_EXCHANGE_TIMEOUT_MS:-30000}
      EXCHANGE_RETRY_COUNT: ${RANKING_EXCHANGE_RETRY_COUNT:-2}

volumes:
  postgres-data: